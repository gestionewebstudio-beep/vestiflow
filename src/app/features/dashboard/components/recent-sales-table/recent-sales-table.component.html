<div class="recent-sales__wrapper">
  <table class="recent-sales">
    <colgroup>
      <col class="recent-sales__col recent-sales__col--order" />
      <col class="recent-sales__col recent-sales__col--customer" />
      <col class="recent-sales__col recent-sales__col--status" />
      <col class="recent-sales__col recent-sales__col--numeric" />
      <col class="recent-sales__col recent-sales__col--numeric" />
    </colgroup>
    <thead>
      <tr>
        <th scope="col">Ordine</th>
        <th scope="col">Cliente</th>
        <th scope="col">Stato</th>
        <th scope="col" class="recent-sales__cell--numeric">Data</th>
        <th scope="col" class="recent-sales__cell--numeric">Totale</th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.orderId) {
        <tr
          class="recent-sales__row"
          tabindex="0"
          [attr.aria-label]="'Apri vendita ' + row.orderNumber"
          (click)="rowClick.emit(row)"
          (keydown.enter)="rowClick.emit(row)"
          (keydown.space)="$event.preventDefault(); rowClick.emit(row)"
        >
          <td class="recent-sales__number tabular-nums" data-label="Ordine">
            {{ row.orderNumber }}
          </td>
          <td data-label="Cliente">{{ row.customerName }}</td>
          <td data-label="Stato">
            <span class="recent-sales__cell-value">
              <app-badge [tone]="statusTone(row.financialStatus)">
                {{ statusLabel(row.financialStatus) }}
              </app-badge>
            </span>
          </td>
          <td class="recent-sales__cell--numeric tabular-nums" data-label="Data">
            {{ formatDate(row.placedAt) }}
          </td>
          <td class="recent-sales__cell--numeric tabular-nums" data-label="Totale">
            {{ formatMoney(row.total) }}
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
