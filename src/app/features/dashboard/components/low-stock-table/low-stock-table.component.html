<div class="low-stock__wrapper">
  <table class="low-stock">
    <colgroup>
      <col class="low-stock__col low-stock__col--variant" />
      <col class="low-stock__col low-stock__col--location" />
      <col class="low-stock__col low-stock__col--numeric" />
      <col class="low-stock__col low-stock__col--numeric" />
    </colgroup>
    <thead>
      <tr>
        <th scope="col">Variante</th>
        <th scope="col">Location</th>
        <th scope="col" class="low-stock__cell--numeric">Disponibile</th>
        <th scope="col" class="low-stock__cell--numeric">Soglia</th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.variantId + row.locationId) {
        <tr class="low-stock__row">
          <td data-label="Variante">
            <span class="low-stock__title">{{ row.title }}</span>
            <span class="low-stock__sku tabular-nums">{{ row.sku }}</span>
          </td>
          <td data-label="Location">{{ row.locationName }}</td>
          <td class="low-stock__cell--numeric" data-label="Disponibile">
            <app-badge [tone]="row.available <= 0 ? 'error' : 'warning'">
              <span class="tabular-nums">{{ row.available }}</span>
            </app-badge>
          </td>
          <td class="low-stock__cell--numeric tabular-nums" data-label="Soglia">
            {{ row.minThreshold }}
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
