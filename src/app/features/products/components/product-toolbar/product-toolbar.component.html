<div class="product-toolbar">
  <div class="product-toolbar__search">
    <i class="pi pi-search product-toolbar__search-icon" aria-hidden="true"></i>
    <input
      id="product-search"
      class="product-toolbar__input"
      type="search"
      [value]="search()"
      placeholder="Cerca per nome o brand…"
      aria-label="Cerca prodotti"
      (input)="onSearchInput($event)"
    />
  </div>

  <div class="product-toolbar__filters">
    <div class="product-toolbar__field">
      <span class="product-toolbar__label">Categoria</span>
      <app-select-menu
        [options]="categoryOptions()"
        [value]="filters().category ?? ''"
        ariaLabel="Filtra per categoria"
        placeholder="Tutte"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('category', $event)"
      />
    </div>

    <div class="product-toolbar__field">
      <span class="product-toolbar__label">Brand</span>
      <app-select-menu
        [options]="brandOptions()"
        [value]="filters().brand ?? ''"
        ariaLabel="Filtra per brand"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('brand', $event)"
      />
    </div>

    <div class="product-toolbar__field">
      <span class="product-toolbar__label">Stagione</span>
      <app-select-menu
        [options]="seasonOptions()"
        [value]="filters().season ?? ''"
        ariaLabel="Filtra per stagione"
        placeholder="Tutte"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('season', $event)"
      />
    </div>

    <div class="product-toolbar__field">
      <span class="product-toolbar__label">Stato</span>
      <app-select-menu
        [options]="statusOptions()"
        [value]="filters().status ?? ''"
        ariaLabel="Filtra per stato"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('status', $event)"
      />
    </div>

    <app-button variant="ghost" [disabled]="!hasActiveFilters()" (click)="resetFilters.emit()">
      <i class="pi pi-filter-slash" aria-hidden="true"></i>
      Azzera filtri
    </app-button>
  </div>
</div>
