<div class="product-toolbar">
  <div class="product-toolbar__search">
    <i class="pi pi-search product-toolbar__search-icon" aria-hidden="true"></i>
    <input
      id="product-search"
      class="product-toolbar__input"
      type="search"
      [value]="search()"
      placeholder="Cerca per nome, brand, SKU…"
      aria-label="Cerca prodotti"
      (input)="onSearchInput($event)"
    />
  </div>

  @if (barcodeScannerEnabled()) {
    <app-barcode-scanner label="Scansiona barcode" (scanned)="barcodeScanned.emit($event)" />
  }

  <div class="product-toolbar__filters">
    <div class="product-toolbar__field">
      <app-select-menu
        chipLabel="Categoria"
        [options]="categoryOptions()"
        [value]="filters().category ?? ''"
        ariaLabel="Filtra per categoria"
        placeholder="Tutte"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('category', $event)"
        [filterChip]="true"
      />
    </div>

    <div class="product-toolbar__field">
      <app-select-menu
        chipLabel="Venditore/Brand"
        [options]="brandOptions()"
        [value]="filters().brand ?? ''"
        ariaLabel="Filtra per brand"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('brand', $event)"
        [filterChip]="true"
      />
    </div>

    <div class="product-toolbar__field">
      <app-select-menu
        chipLabel="Stagione"
        [options]="seasonOptions()"
        [value]="filters().season ?? ''"
        ariaLabel="Filtra per stagione"
        placeholder="Tutte"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('season', $event)"
        [filterChip]="true"
      />
    </div>

    <div class="product-toolbar__field">
      <app-select-menu
        chipLabel="Stato"
        [options]="statusOptions()"
        [value]="filters().status ?? ''"
        ariaLabel="Filtra per stato"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onFilterChange('status', $event)"
        [filterChip]="true"
      />
    </div>

    <app-button variant="secondary" [disabled]="!hasActiveFilters()" (click)="resetFilters.emit()">
      <i class="pi pi-filter-slash" aria-hidden="true"></i>
      Azzera filtri
    </app-button>
  </div>
</div>
