<table class="variant-table">
  <thead class="variant-table__head">
    <tr>
      <th scope="col">SKU</th>
      <th scope="col">Taglia</th>
      <th scope="col">Colore</th>
      <th scope="col" class="variant-table__cell--numeric">Prezzo</th>
      <th scope="col">Barcode</th>
    </tr>
  </thead>

  <tbody>
    @for (variant of variants(); track variant.id) {
      <tr class="variant-table__row">
        <td class="variant-table__sku" data-label="SKU">{{ variant.sku }}</td>
        <td data-label="Taglia">{{ variant.size }}</td>
        <td data-label="Colore">{{ variant.color }}</td>
        <td class="variant-table__cell--numeric tabular-nums" data-label="Prezzo">
          {{ formatPrice(variant.sellingPrice) }}
        </td>
        <td class="tabular-nums" data-label="Barcode">{{ variant.barcode ?? '—' }}</td>
      </tr>
    }
  </tbody>
</table>
