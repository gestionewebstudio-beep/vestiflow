<section class="product-list">
  <header class="product-list__header">
    <h1 class="product-list__title">Prodotti</h1>
    <div class="product-list__actions">
      <app-button variant="secondary" (click)="importProducts()">
        <i class="pi pi-upload" aria-hidden="true"></i>
        Importa CSV
      </app-button>
      <app-button (click)="createProduct()">
        <i class="pi pi-plus" aria-hidden="true"></i>
        Aggiungi prodotto
      </app-button>
    </div>
  </header>

  <app-product-toolbar
    [search]="searchDraft()"
    [filters]="query()"
    [categories]="filterOptions().categories"
    [brands]="filterOptions().brands"
    [seasons]="filterOptions().seasons"
    [statusOptions]="statusOptions"
    [hasActiveFilters]="hasActiveFilters()"
    (searchChange)="onSearchInput($event)"
    (filterChange)="onFilterChange($event)"
    (resetFilters)="onResetFilters()"
  />

  @if (loading()) {
    <app-table-skeleton [columns]="skeletonColumns" [rows]="8" />
  } @else if (error(); as appError) {
    <app-error-state [description]="appError.message" retryLabel="Riprova" (retry)="reload()" />
  } @else if (isEmpty()) {
    <app-empty-state
      title="Nessun prodotto"
      description="Nessun prodotto corrisponde ai filtri attuali. Modifica i criteri o azzera i filtri."
      icon="pi-tags"
    />
  } @else {
    <app-product-table
      [products]="products()"
      [sortField]="query().sort"
      [sortOrder]="query().order"
      (rowClick)="openProduct($event)"
      (sortChange)="onSortChange($event)"
    />
    <app-pagination
      label="Paginazione prodotti"
      [meta]="meta()"
      [pageSizeOptions]="pageSizeOptions"
      (pageChange)="goToPage($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</section>
