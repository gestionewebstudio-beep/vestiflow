@if (linked()) {
  <p class="gr-code-cell__linked" [title]="linkedValue()">{{ linkedValue() || '—' }}</p>
} @else {
  <div class="gr-code-cell">
    <input
      #codeInput
      class="gr-code-cell__input"
      type="text"
      [id]="inputId() || null"
      [disabled]="disabled()"
      [value]="value()"
      [placeholder]="placeholder()"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-expanded]="suggestionsOpen()"
      [attr.aria-controls]="listboxId()"
      autocomplete="off"
      (input)="onInput($any($event.target).value)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeydown($event)"
    />
    @if (suggestionsOpen() && suggestions().length > 0) {
      <ul
        class="gr-code-cell__suggestions"
        role="listbox"
        [id]="listboxId()"
        [attr.aria-label]="'Suggerimenti ' + ariaLabel()"
      >
        @for (item of suggestions(); track item.variantId; let i = $index) {
          <li
            role="option"
            tabindex="0"
            class="gr-code-cell__suggestion"
            [class.gr-code-cell__suggestion--active]="i === activeSuggestionIndex()"
            [attr.aria-selected]="i === activeSuggestionIndex()"
            (mousedown)="$event.preventDefault()"
            (click)="pickSuggestion(item.variantId)"
            (keydown)="onSuggestionKeydown($event, item.variantId)"
          >
            <span class="gr-code-cell__suggestion-title">{{ item.title }}</span>
            <span class="gr-code-cell__suggestion-detail">{{ suggestionDetail(item) }}</span>
          </li>
        }
      </ul>
    }
  </div>
}
