<section class="gr-product-search">
  <div class="gr-product-search__head">
    <label class="gr-product-search__label" for="gr-product-search-input">Cerca prodotto</label>
    <p class="gr-product-search__hint">
      Cerca per nome, SKU o EAN. Seleziona un risultato per aggiungerlo alla riga in modifica.
    </p>
    <div class="gr-product-search__field">
      <input
        id="gr-product-search-input"
        class="gr-product-search__input"
        type="search"
        [ngModel]="searchQuery()"
        placeholder="Nome, SKU, EAN, codice fornitore…"
        autocomplete="off"
        (ngModelChange)="onSearchInput($event)"
        (keydown)="onSearchKeydown($event)"
      />
      <button
        type="button"
        class="gr-product-search__search-btn"
        aria-label="Cerca prodotto"
        (click)="runSearch()"
      >
        <i class="pi pi-search" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  @if (searchQuery().trim().length === 0) {
    <app-empty-state
      icon="pi-search"
      title="Digita per cercare"
      description="Inserisci almeno un carattere e premi Cerca o Invio."
    />
  } @else if (results().length === 0) {
    <app-empty-state
      icon="pi-search"
      title="Nessun prodotto trovato"
      description="Prova con un altro termine o crea un nuovo prodotto dalla riga del documento."
    />
  } @else {
    <ul class="gr-product-search__list">
      @for (item of results(); track item.variantId) {
        <li>
          <button
            type="button"
            class="gr-product-search__item"
            title="Clicca o doppio clic per aggiungere alla riga"
            (click)="selectVariant(item.variantId)"
            (dblclick)="selectVariant(item.variantId)"
          >
            <span class="gr-product-search__thumb">
              @if (item.imageUrl) {
                <img [src]="item.imageUrl" [alt]="item.title" loading="lazy" />
              } @else {
                <i class="pi pi-image" aria-hidden="true"></i>
              }
            </span>
            <span class="gr-product-search__info">
              <span class="gr-product-search__title">{{ item.title }}</span>
              @if (resultCodes(item); as codes) {
                <span class="gr-product-search__codes">{{ codes }}</span>
              }
              @if (stockStatus(item); as status) {
                <span
                  class="gr-product-search__stock"
                  [class.gr-product-search__stock--ok]="status === StockStatus.Ok"
                  [class.gr-product-search__stock--low]="status === StockStatus.Low"
                  [class.gr-product-search__stock--empty]="status === StockStatus.Empty"
                >
                  {{ stockLabel(item) }}
                </span>
              }
            </span>
            @if (priceLabel(item); as price) {
              <span class="gr-product-search__price">{{ price }}</span>
            }
          </button>
        </li>
      }
    </ul>
  }

  <div class="gr-product-search__actions">
    <app-button type="button" variant="ghost" (click)="close()">Chiudi</app-button>
  </div>
</section>
