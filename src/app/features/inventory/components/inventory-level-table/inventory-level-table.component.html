<table class="level-table">
  <thead class="level-table__head">
    <tr>
      <th scope="col">Variante</th>
      <th scope="col">SKU</th>
      <th scope="col">Location</th>
      <th scope="col" class="level-table__cell--numeric">Disponibile</th>
      <th scope="col" class="level-table__cell--numeric">Fisico</th>
      <th scope="col" class="level-table__cell--numeric">Impegnato</th>
      <th scope="col" class="level-table__cell--numeric">In arrivo</th>
      <th scope="col">Stato</th>
    </tr>
  </thead>

  <tbody>
    @for (row of rows(); track row.id) {
      <tr class="level-table__row">
        <td class="level-table__title" data-label="Variante">{{ row.title }}</td>
        <td class="level-table__sku tabular-nums" data-label="SKU">{{ row.sku }}</td>
        <td data-label="Location">{{ row.locationName }}</td>
        <td
          class="level-table__cell--numeric tabular-nums"
          [class.level-table__cell--negative]="row.available < 0"
          data-label="Disponibile"
        >
          {{ row.available }}
        </td>
        <td class="level-table__cell--numeric tabular-nums" data-label="Fisico">
          {{ row.onHand }}
        </td>
        <td class="level-table__cell--numeric tabular-nums" data-label="Impegnato">
          {{ row.committed }}
        </td>
        <td class="level-table__cell--numeric tabular-nums" data-label="In arrivo">
          {{ row.incoming }}
        </td>
        <td data-label="Stato">
          <app-badge [tone]="statusTone(row.status)">{{ statusLabel(row.status) }}</app-badge>
        </td>
      </tr>
    }
  </tbody>
</table>
