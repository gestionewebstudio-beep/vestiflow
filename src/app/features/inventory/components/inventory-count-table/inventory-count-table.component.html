<div class="count-table__scroll">
  <table class="count-table">
    <thead>
      <tr>
        <th scope="col">Sessione</th>
        <th scope="col">Location</th>
        <th scope="col">Stato</th>
        <th scope="col" class="count-table__col--numeric">Progresso</th>
        <th scope="col" class="count-table__col--numeric">Differenze</th>
        <th scope="col">Creato</th>
      </tr>
    </thead>
    <tbody>
      @for (session of sessions(); track session.id) {
        <tr
          class="count-table__row"
          tabindex="0"
          (click)="rowClick.emit(session)"
          (keydown.enter)="rowClick.emit(session)"
        >
          <td data-label="Sessione">
            <span class="count-table__name">{{ session.name }}</span>
          </td>
          <td data-label="Location">{{ session.locationName }}</td>
          <td data-label="Stato">
            <app-badge [tone]="statusTone(session.status)">
              {{ statusLabel(session.status) }}
            </app-badge>
          </td>
          <td class="count-table__numeric tabular-nums" data-label="Progresso">
            {{ progress(session) }}
          </td>
          <td class="count-table__numeric tabular-nums" data-label="Differenze">
            {{ session.linesWithDelta }}
          </td>
          <td data-label="Creato">{{ formatDate(session.createdAt) }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
