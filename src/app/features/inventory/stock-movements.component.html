<section class="stock-movements">
  <header class="stock-movements__header">
    <h1 class="stock-movements__title">Movimenti di magazzino</h1>
    @if (canManageInventory()) {
      <div class="stock-movements__header-actions">
        @for (action of movementActions; track action.type) {
          <app-button variant="secondary" (click)="newMovement(action.type)">
            <i class="pi {{ action.icon }}" aria-hidden="true"></i>
            {{ action.label }}
          </app-button>
        }
      </div>
    }
  </header>

  <app-inventory-tabs />

  <div class="stock-movements__filters">
    <div class="stock-movements__field stock-movements__field--select">
      <app-select-menu
        chipLabel="Tipo movimento"
        [options]="movementTypeOptions"
        [value]="typeFilter()"
        ariaLabel="Filtra per tipo movimento"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onTypeFilterChange($event)"
        [filterChip]="true"
      />
    </div>

    <div class="stock-movements__field stock-movements__field--select">
      <app-select-menu
        chipLabel="Origine"
        [options]="originOptions()"
        [value]="originFilter()"
        ariaLabel="Filtra per origine movimento"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onOriginFilterChange($event)"
        [filterChip]="true"
      />
    </div>

    <div class="stock-movements__field stock-movements__field--select">
      <app-select-menu
        chipLabel="Location"
        [options]="locationOptions()"
        [value]="locationFilter()"
        ariaLabel="Filtra per location"
        placeholder="Tutte"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onLocationFilterChange($event)"
        [filterChip]="true"
      />
    </div>

    <div class="stock-movements__field stock-movements__field--select">
      <app-select-menu
        chipLabel="Periodo"
        [options]="periodOptions"
        [value]="periodFilter()"
        ariaLabel="Filtra per periodo"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        (valueChange)="onPeriodFilterChange($event)"
        [filterChip]="true"
      />
    </div>

    @if (isCustomPeriod()) {
      <div class="stock-movements__field stock-movements__field--date">
        <label class="stock-movements__label" for="movements-from">Dal</label>
        <app-date-input
          inputId="movements-from"
          [value]="fromFilter()"
          ariaLabel="Data inizio periodo"
          placeholder="gg/mm/aaaa"
          [compact]="true"
          [fullWidth]="true"
          [max]="toFilter() || undefined"
          (valueChange)="onFromFilterChange($event)"
        />
      </div>

      <div class="stock-movements__field stock-movements__field--date">
        <label class="stock-movements__label" for="movements-to">Al</label>
        <app-date-input
          inputId="movements-to"
          [value]="toFilter()"
          ariaLabel="Data fine periodo"
          placeholder="gg/mm/aaaa"
          [compact]="true"
          [fullWidth]="true"
          [min]="fromFilter() || undefined"
          (valueChange)="onToFilterChange($event)"
        />
      </div>
    }

    <div class="stock-movements__field stock-movements__field--search">
      <label class="stock-movements__label" for="movements-search">Prodotto</label>
      <div class="stock-movements__search">
        <i class="pi pi-search stock-movements__search-icon" aria-hidden="true"></i>
        <input
          id="movements-search"
          class="stock-movements__search-input"
          type="search"
          [value]="searchDraft()"
          placeholder="Nome, SKU o cod. articolo"
          aria-label="Cerca per nome prodotto, SKU o codice articolo"
          (input)="onSearchInput($event)"
        />
      </div>
    </div>

    <div class="stock-movements__field stock-movements__field--select">
      <app-select-menu
        chipLabel="Cliente/Fornitore"
        [options]="partyOptions()"
        [value]="partyFilter()"
        ariaLabel="Filtra per cliente o fornitore"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        [searchable]="true"
        (valueChange)="onPartyFilterChange($event)"
        [filterChip]="true"
      />
    </div>

    <div class="stock-movements__field stock-movements__field--select">
      <app-select-menu
        chipLabel="Operatore"
        [options]="operatorOptions()"
        [value]="operatorFilter()"
        ariaLabel="Filtra per operatore"
        placeholder="Tutti"
        [compact]="true"
        [fullWidth]="true"
        [searchable]="true"
        (valueChange)="onOperatorFilterChange($event)"
        [filterChip]="true"
      />
    </div>

    <div class="stock-movements__filters-action">
      <app-table-column-picker [viewId]="tableViewId" />
      <app-button variant="secondary" [disabled]="!hasActiveFilters()" (click)="resetFilters()">
        <i class="pi pi-filter-slash" aria-hidden="true"></i>
        Azzera filtri
      </app-button>
    </div>
  </div>

  @if (loading()) {
    <app-table-skeleton [columns]="skeletonColumns" [rows]="8" />
  } @else if (error(); as appError) {
    <app-error-state [description]="appError.message" retryLabel="Riprova" (retry)="reload()" />
  } @else if (isEmpty()) {
    <app-empty-state
      title="Nessun movimento"
      description="Nessun movimento corrisponde ai filtri attuali. Registra un carico, uno scarico o un trasferimento."
      icon="pi-arrow-right-arrow-left"
      [ctaLabel]="emptyStateCtaLabel()"
      (ctaClick)="onEmptyStateAction()"
    />
  } @else {
    <app-movement-table [rows]="rows()" [columns]="tableColumns()" />
    <app-pagination
      label="Paginazione movimenti di magazzino"
      [meta]="meta()"
      [pageSizeOptions]="pageSizeOptions"
      (pageChange)="goToPage($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</section>
