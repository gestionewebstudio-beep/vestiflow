<section class="reports">
  <header class="reports__header">
    <h1 class="reports__title">Report</h1>
    <p class="reports__subtitle">Sintesi operativa di magazzino e vendite.</p>
  </header>

  @if (loading()) {
    <app-table-skeleton [columns]="4" [rows]="6" />
  } @else if (error(); as appError) {
    <app-error-state [description]="appError.message" retryLabel="Riprova" (retry)="reload()" />
  } @else {
    <div class="reports__kpis">
      <app-stat-card
        label="Valore magazzino"
        [value]="stockValueLabel()"
        icon="pi-euro"
        tone="info"
        hint="Disponibile a prezzo di vendita"
      />
      <app-stat-card
        label="Pezzi disponibili"
        [value]="availableUnitsLabel()"
        icon="pi-box"
        tone="neutral"
        hint="Su tutte le location"
      />
      <app-stat-card
        label="Varianti sotto soglia"
        [value]="lowStockLabel()"
        icon="pi-exclamation-triangle"
        tone="warning"
        hint="Sotto soglia o esaurite"
      />
      <app-stat-card
        label="Fatturato"
        [value]="revenueLabel()"
        icon="pi-shopping-cart"
        tone="success"
        hint="Ordini pagati (lordo)"
      />
    </div>

    <section class="reports__panel" aria-labelledby="report-inventory">
      <h2 id="report-inventory" class="reports__panel-title">Giacenze per location</h2>
      <app-report-location-table [rows]="locationRows()" />
    </section>

    <section class="reports__panel" aria-labelledby="report-sales">
      <h2 id="report-sales" class="reports__panel-title">Vendite per stato pagamento</h2>
      <app-report-sales-table [rows]="salesRows()" />
    </section>
  }
</section>
