<section class="reports">
  <header class="reports__header">
    <h1 class="reports__title">Report</h1>
    <p class="reports__subtitle">{{ pageSubtitle() }}</p>
  </header>

  @if (canExportCorrispettivi()) {
    <div class="reports__corrispettivi-link">
      <a routerLink="corrispettivi" class="reports__corrispettivi-anchor">
        Apri registro corrispettivi commercialista →
      </a>
      <a routerLink="accountant-register" class="reports__corrispettivi-anchor">
        Registro commercialista unificato →
      </a>
    </div>

    <app-report-corrispettivi-export
      [period]="displayPeriod()"
      [dateFrom]="dateFromDraft()"
      [dateTo]="dateToDraft()"
      [channel]="corrispettiviChannel()"
      [channelOptions]="corrispettiviChannelOptions()"
      [channelHint]="corrispettiviChannelHint()"
      [periodLabel]="periodLabel()"
      [exporting]="exporting()"
      (periodChange)="onPeriodChange($event)"
      (dateFromChange)="onDateFromChange($event)"
      (dateToChange)="onDateToChange($event)"
      (channelChange)="onCorrispettiviChannelChange($event)"
      (exportClick)="exportCorrispettivi()"
    />
  }

  <app-business-analytics-panel
    layout="reports"
    [hidePeriodFilter]="true"
    [period]="displayPeriod()"
    [dateFrom]="dateFromDraft()"
    [dateTo]="dateToDraft()"
  />

  @if (loading()) {
    <app-table-skeleton [columns]="4" [rows]="6" />
  } @else if (error(); as appError) {
    <app-error-state [description]="appError.message" retryLabel="Riprova" (retry)="reload()" />
  } @else {
    <div class="reports__body">
      <section class="reports__panel" aria-labelledby="report-inventory">
        <div class="reports__panel-head">
          <div class="reports__panel-heading">
            <h2 id="report-inventory" class="reports__panel-title">Giacenze per location</h2>
            <p class="reports__panel-hint">Snapshot attuale — non filtrato per periodo</p>
          </div>
        </div>
        <app-report-location-table [rows]="locationRows()" />
      </section>
    </div>
  }
</section>
