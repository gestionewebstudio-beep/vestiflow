<div class="report-table__wrapper">
  <table class="report-table">
    <thead>
      <tr>
        <th scope="col">Location</th>
        <th scope="col" class="report-table__cell--numeric">Varianti tracciate</th>
        <th scope="col" class="report-table__cell--numeric">Pezzi disponibili</th>
        <th scope="col" class="report-table__cell--numeric">Sotto soglia</th>
        <th scope="col" class="report-table__cell--numeric">Valore stock</th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.locationId) {
        <tr class="report-table__row">
          <td data-label="Location">{{ row.locationName }}</td>
          <td class="report-table__cell--numeric tabular-nums" data-label="Varianti tracciate">
            {{ row.trackedVariants }}
          </td>
          <td class="report-table__cell--numeric tabular-nums" data-label="Pezzi disponibili">
            {{ row.availableUnits }}
          </td>
          <td
            class="report-table__cell--numeric tabular-nums"
            data-label="Sotto soglia"
            [class.report-table__cell--warning]="row.lowStockCount > 0"
          >
            {{ row.lowStockCount }}
          </td>
          <td class="report-table__cell--numeric tabular-nums" data-label="Valore stock">
            {{ formatMoney(row.stockValue) }}
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
