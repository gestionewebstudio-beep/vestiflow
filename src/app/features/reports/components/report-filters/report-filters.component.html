<div class="report-filters">
  <div class="report-filters__head">
    <h2 class="report-filters__title">Filtri riepilogo vendite</h2>
    <p class="report-filters__hint">
      Canale e pagamento filtrano solo il riepilogo vendite sotto. Il periodo segue quello
      selezionato nell'export corrispettivi.
    </p>
  </div>

  <div class="report-filters__toolbar">
    <div class="report-filters__fields">
      <div class="report-filters__field report-filters__field--select">
        <span class="report-filters__label">Canale</span>
        <app-select-menu
          [options]="sourceOptions"
          [value]="source()"
          ariaLabel="Filtra per canale vendita"
          placeholder="Tutti"
          [compact]="true"
          [fullWidth]="true"
          (valueChange)="onSourceChange($event)"
        />
      </div>

      <div class="report-filters__field report-filters__field--select">
        <span class="report-filters__label">Pagamento</span>
        <app-select-menu
          [options]="financialStatusOptions"
          [value]="financialStatus()"
          ariaLabel="Filtra per stato pagamento"
          placeholder="Tutti"
          [compact]="true"
          [fullWidth]="true"
          (valueChange)="onFinancialStatusChange($event)"
        />
      </div>
    </div>

    <div class="report-filters__actions">
      <app-button
        variant="secondary"
        [disabled]="!hasActiveFilters()"
        (click)="resetFilters.emit()"
      >
        <i class="pi pi-filter-slash" aria-hidden="true"></i>
        Azzera filtri
      </app-button>
    </div>
  </div>
</div>
