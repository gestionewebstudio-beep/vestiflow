<section class="po-list">
  <header class="po-list__header">
    <div class="po-list__heading">
      <h1 class="po-list__title">Ordini Fornitori</h1>
      <p class="po-list__subtitle">
        Ordini di acquisto verso i fornitori: l'ordine nasce confermato e si conclude quando viene
        incluso in un arrivo merce.
      </p>
    </div>
    @if (canManageSupplierOrders()) {
      <app-button (click)="createOrder()">
        <i class="pi pi-plus" aria-hidden="true"></i>
        Nuovo ordine
      </app-button>
    }
  </header>

  <div class="po-list__toolbar">
    <div class="po-list__search">
      <i class="pi pi-search po-list__search-icon" aria-hidden="true"></i>
      <input
        id="po-search"
        class="po-list__input"
        type="search"
        [value]="searchDraft()"
        placeholder="Cerca per riferimento o fornitore…"
        aria-label="Cerca ordini fornitori"
        (input)="onSearchInput($event)"
      />
    </div>

    <div class="po-list__filters">
      <div class="po-list__field">
        <app-select-menu
          chipLabel="Stato"
          [options]="statusOptions"
          [value]="query().status ?? ''"
          ariaLabel="Filtra per stato ordine"
          placeholder="Tutti"
          [compact]="true"
          [fullWidth]="true"
          (valueChange)="onStatusFilterChange($event)"
          [filterChip]="true"
        />
      </div>

      <app-button variant="secondary" [disabled]="!hasActiveFilters()" (click)="resetFilters()">
        <i class="pi pi-filter-slash" aria-hidden="true"></i>
        Azzera filtri
      </app-button>
    </div>
  </div>

  @if (loading()) {
    <app-table-skeleton [columns]="skeletonColumns" [rows]="6" />
  } @else if (error(); as appError) {
    <app-error-state [description]="appError.message" retryLabel="Riprova" (retry)="reload()" />
  } @else if (isEmpty()) {
    <app-empty-state
      title="Nessun ordine fornitore"
      description="Nessun ordine corrisponde ai filtri attuali. Modifica i criteri o azzera i filtri."
      icon="pi-truck"
    />
  } @else {
    <app-supplier-order-table [orders]="orders()" (rowClick)="openOrder($event)" />
    <app-pagination
      label="Paginazione ordini fornitori"
      [meta]="meta()"
      [pageSizeOptions]="pageSizeOptions"
      (pageChange)="goToPage($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  }
</section>
