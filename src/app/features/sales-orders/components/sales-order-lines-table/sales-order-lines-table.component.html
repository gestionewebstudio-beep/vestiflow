<div class="lines-table__wrapper">
  <table class="lines-table">
    <thead>
      <tr>
        <th scope="col">Articolo</th>
        <th scope="col">SKU</th>
        <th scope="col" class="lines-table__cell--numeric">Quantità</th>
        <th scope="col" class="lines-table__cell--numeric">Prezzo unitario</th>
        <th scope="col" class="lines-table__cell--numeric">Totale riga</th>
      </tr>
    </thead>
    <tbody>
      @for (line of lines(); track line.id) {
        <tr class="lines-table__row">
          <td data-label="Articolo">{{ line.title }}</td>
          <td class="lines-table__sku tabular-nums" data-label="SKU">{{ line.sku }}</td>
          <td class="lines-table__cell--numeric tabular-nums" data-label="Quantità">
            {{ line.quantity }}
          </td>
          <td class="lines-table__cell--numeric tabular-nums" data-label="Prezzo unitario">
            {{ formatMoney(line.unitPrice) }}
          </td>
          <td class="lines-table__cell--numeric tabular-nums" data-label="Totale riga">
            {{ formatMoney(line.lineTotal) }}
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
