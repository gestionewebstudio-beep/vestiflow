<section class="supplier-form">
  <a class="supplier-form__back" [routerLink]="listPath">
    <i class="pi pi-arrow-left" aria-hidden="true"></i>
    Fornitori
  </a>

  <header class="supplier-form__header">
    <h1 class="supplier-form__title">
      {{ isEdit() ? 'Modifica fornitore' : 'Nuovo fornitore' }}
    </h1>
  </header>

  @if (loading()) {
    <app-table-skeleton [columns]="2" [rows]="8" />
  } @else if (loadError(); as appError) {
    <app-error-state [description]="appError.message" />
  } @else {
    <form class="supplier-form__body" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="supplier-form__grid">
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-code">Codice</label>
          <input
            id="supplier-code"
            class="supplier-form__control"
            type="text"
            formControlName="code"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-name">Ragione sociale</label>
          <input
            id="supplier-name"
            class="supplier-form__control"
            type="text"
            formControlName="name"
            [attr.aria-invalid]="form.controls.name.invalid && form.controls.name.touched"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-vat">P. IVA</label>
          <input
            id="supplier-vat"
            class="supplier-form__control"
            type="text"
            formControlName="vatNumber"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-tax">Codice fiscale</label>
          <input
            id="supplier-tax"
            class="supplier-form__control"
            type="text"
            formControlName="taxCode"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-email">Email</label>
          <input
            id="supplier-email"
            class="supplier-form__control"
            type="email"
            formControlName="email"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-pec">PEC</label>
          <input
            id="supplier-pec"
            class="supplier-form__control"
            type="email"
            formControlName="pec"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-phone">Telefono</label>
          <input
            id="supplier-phone"
            class="supplier-form__control"
            type="tel"
            formControlName="phone"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-contact">Referente</label>
          <input
            id="supplier-contact"
            class="supplier-form__control"
            type="text"
            formControlName="contactName"
          />
        </div>
        <div class="supplier-form__field supplier-form__field--full">
          <label class="supplier-form__label" for="supplier-address1">Indirizzo</label>
          <input
            id="supplier-address1"
            class="supplier-form__control"
            type="text"
            formControlName="addressLine1"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-city">Città</label>
          <input
            id="supplier-city"
            class="supplier-form__control"
            type="text"
            formControlName="city"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-cap">CAP</label>
          <input
            id="supplier-cap"
            class="supplier-form__control"
            type="text"
            formControlName="postalCode"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-province">Provincia</label>
          <input
            id="supplier-province"
            class="supplier-form__control"
            type="text"
            formControlName="province"
          />
        </div>
        <div class="supplier-form__field">
          <label class="supplier-form__label" for="supplier-country">Paese</label>
          <input
            id="supplier-country"
            class="supplier-form__control"
            type="text"
            formControlName="countryCode"
          />
        </div>
        <div class="supplier-form__field supplier-form__field--full">
          <label class="supplier-form__label" for="supplier-payment">Condizioni di pagamento</label>
          <input
            id="supplier-payment"
            class="supplier-form__control"
            type="text"
            formControlName="paymentTerms"
          />
        </div>
        <div class="supplier-form__field supplier-form__field--full">
          <label class="supplier-form__label" for="supplier-notes">Note</label>
          <textarea
            id="supplier-notes"
            class="supplier-form__control supplier-form__textarea"
            rows="3"
            formControlName="notes"
          ></textarea>
        </div>
      </div>

      @if (saveError(); as message) {
        <p class="supplier-form__error" role="alert">{{ message }}</p>
      }

      <div class="supplier-form__actions">
        <app-button type="submit" variant="primary" [loading]="saving()" [disabled]="saving()">
          Salva fornitore
        </app-button>
        <app-button variant="ghost" [routerLink]="listPath">Annulla</app-button>
      </div>
    </form>
  }
</section>
