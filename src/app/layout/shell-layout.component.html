<div class="shell" [class.shell--drawer-open]="drawerOpen()">
  <app-pwa-update-banner />
  <!-- Topbar persistente: dumb, parla allo shell via output(). -->
  <header class="shell__topbar">
    <app-topbar
      [themeMode]="themeMode()"
      [user]="currentUser()"
      [locations]="locations()"
      [activeLocationId]="activeLocationId()"
      [syncStatus]="shopifySyncStatus()"
      (menuToggle)="toggleDrawer()"
      (themeModeChange)="onThemeModeChange($event)"
      (locationChange)="onLocationChange($event)"
      (syncClick)="onSyncClick()"
      (logout)="onLogoutRequest()"
    />
  </header>

  <app-confirm-dialog
    [(open)]="logoutDialogOpen"
    title="Uscire dall'applicazione?"
    message="La sessione verrà chiusa e dovrai accedere di nuovo per continuare."
    confirmLabel="Esci"
    cancelLabel="Annulla"
    (confirmed)="onLogoutConfirm()"
  />

  <!-- Sidebar persistente (desktop) / drawer (mobile). -->
  <aside id="shell-sidebar" class="shell__sidebar">
    <app-sidebar
      [items]="navItems()"
      [footerItems]="footerNavItems()"
      [drawerOpen]="drawerOpen()"
      (closeRequested)="closeDrawer()"
    />
  </aside>

  <!-- Backdrop: solo mobile, quando il drawer e' aperto. -->
  @if (drawerOpen()) {
    <button
      type="button"
      class="shell__backdrop"
      aria-label="Chiudi menu di navigazione"
      (click)="closeDrawer()"
    ></button>
  }

  <!-- Unica regione principale di scroll. -->
  <main class="shell__content">
    <router-outlet />
  </main>
</div>
