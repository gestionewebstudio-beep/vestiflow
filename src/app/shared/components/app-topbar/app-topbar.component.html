<div class="app-topbar">
  <button
    type="button"
    class="app-topbar__menu"
    aria-label="Apri menu di navigazione"
    aria-controls="shell-sidebar"
    (click)="menuToggle.emit()"
  >
    <i class="pi pi-bars" aria-hidden="true"></i>
  </button>

  <span class="app-topbar__brand">VestiFlow</span>

  <div class="app-topbar__spacer"></div>

  <!-- Placeholder selettore negozio attivo (logica reale in step successivi). -->
  <button type="button" class="app-topbar__store" aria-label="Negozio attivo">
    <i class="pi pi-shop" aria-hidden="true"></i>
    <span class="app-topbar__store-label">Tutti i negozi</span>
    <i class="pi pi-angle-down" aria-hidden="true"></i>
  </button>

  <!-- Theme toggle a 3 stati (segmented control). -->
  <div class="app-topbar__theme" role="group" aria-label="Modalità tema">
    @for (option of themeOptions; track option.mode) {
      <button
        type="button"
        class="app-topbar__theme-btn"
        [class.app-topbar__theme-btn--active]="themeMode() === option.mode"
        [attr.aria-pressed]="themeMode() === option.mode"
        [attr.aria-label]="option.label"
        [title]="option.label"
        (click)="themeModeChange.emit(option.mode)"
      >
        <i class="pi" [ngClass]="option.icon" aria-hidden="true"></i>
      </button>
    }
  </div>

  <!-- Utente corrente: avatar (display) + logout esplicito. Nessun menu in questo step. -->
  @if (user()) {
    <div class="app-topbar__user">
      <span class="app-topbar__avatar" [title]="displayName()" aria-hidden="true">{{
        initials()
      }}</span>
      <button
        type="button"
        class="app-topbar__logout"
        [attr.aria-label]="'Esci (' + displayName() + ')'"
        (click)="logout.emit()"
      >
        <i class="pi pi-sign-out" aria-hidden="true"></i>
      </button>
    </div>
  }
</div>
