<nav class="pagination" [attr.aria-label]="label()">
  <div class="pagination__size">
    <label class="pagination__label" for="page-size">Per pagina</label>
    <select
      id="page-size"
      class="pagination__select"
      [value]="meta().pageSize"
      (change)="onPageSizeChange($event)"
    >
      @for (size of pageSizeOptions(); track size) {
        <option [value]="size">{{ size }}</option>
      }
    </select>
  </div>

  <p class="pagination__info tabular-nums">
    {{ rangeStart() }}–{{ rangeEnd() }} di {{ meta().total }}
  </p>

  <div class="pagination__controls">
    <app-button variant="secondary" [disabled]="!canPrev()" (click)="prev()">
      <i class="pi pi-chevron-left" aria-hidden="true"></i>
      <span class="pagination__btn-label">Precedente</span>
    </app-button>
    <span class="pagination__page tabular-nums">
      <span class="pagination__page-full">Pagina {{ meta().page }} di {{ meta().totalPages }}</span>
      <span class="pagination__page-short">{{ meta().page }}/{{ meta().totalPages }}</span>
    </span>
    <app-button variant="secondary" [disabled]="!canNext()" (click)="next()">
      <span class="pagination__btn-label">Successiva</span>
      <i class="pi pi-chevron-right" aria-hidden="true"></i>
    </app-button>
  </div>
</nav>
