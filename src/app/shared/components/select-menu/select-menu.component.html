<div
  class="select-menu"
  [class.select-menu--compact]="compact()"
  [class.select-menu--open]="open()"
>
  <button
    type="button"
    class="select-menu__trigger"
    [attr.aria-label]="ariaLabel()"
    aria-haspopup="listbox"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    @if (triggerIcon(); as icon) {
      <i class="select-menu__trigger-icon pi" [class]="icon" aria-hidden="true"></i>
    }
    <span class="select-menu__trigger-label">{{ selectedLabel() }}</span>
    <i class="select-menu__chevron pi pi-chevron-down" aria-hidden="true"></i>
  </button>

  @if (open()) {
    <ul class="select-menu__panel" role="listbox" [attr.aria-label]="ariaLabel()">
      <li class="select-menu__option" role="presentation">
        <button
          type="button"
          class="select-menu__option-btn"
          role="option"
          [attr.aria-selected]="isEmptySelected()"
          (click)="select({ value: '', label: placeholder() })"
        >
          @if (isEmptySelected()) {
            <i class="select-menu__check pi pi-check" aria-hidden="true"></i>
          } @else {
            <span class="select-menu__check-placeholder" aria-hidden="true"></span>
          }
          <span class="select-menu__option-label">{{ placeholder() }}</span>
        </button>
      </li>
      @for (option of options(); track option.value) {
        <li class="select-menu__option" role="presentation">
          <button
            type="button"
            class="select-menu__option-btn"
            role="option"
            [attr.aria-selected]="isSelected(option)"
            (click)="select(option)"
          >
            @if (isSelected(option)) {
              <i class="select-menu__check pi pi-check" aria-hidden="true"></i>
            } @else {
              <span class="select-menu__check-placeholder" aria-hidden="true"></span>
            }
            <span class="select-menu__option-label">{{ option.label }}</span>
          </button>
        </li>
      }
    </ul>
  }
</div>
