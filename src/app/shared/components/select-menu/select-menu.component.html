<div
  class="select-menu"
  [class.select-menu--compact]="compact()"
  [class.select-menu--open]="open()"
  [class.select-menu--invalid]="invalid()"
>
  <button
    type="button"
    class="select-menu__trigger"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-invalid]="invalid() ? true : null"
    [attr.aria-describedby]="describedBy() || null"
    aria-haspopup="listbox"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    @if (triggerIcon(); as icon) {
      <i class="select-menu__trigger-icon pi {{ icon }}" aria-hidden="true"></i>
    }
    @if (selectedSwatchCssColor(); as swatchColor) {
      <span
        class="select-menu__swatch"
        [class.select-menu__swatch--clear]="swatchColor === 'transparent'"
        [style.background]="swatchColor === 'transparent' ? null : swatchColor"
        aria-hidden="true"
      ></span>
    }
    <span class="select-menu__trigger-label">{{ selectedLabel() }}</span>
    <i class="select-menu__chevron pi pi-chevron-down" aria-hidden="true"></i>
  </button>

  @if (open()) {
    <ul
      class="select-menu__panel"
      role="listbox"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-multiselectable]="multiple() ? true : null"
    >
      @if (includeEmptyOption()) {
        <li class="select-menu__option" role="presentation">
          <button
            type="button"
            class="select-menu__option-btn"
            role="option"
            [attr.aria-selected]="isEmptySelected()"
            (click)="select({ value: '', label: placeholder() })"
          >
            @if (isEmptySelected()) {
              <i class="select-menu__check pi pi-check" aria-hidden="true"></i>
            } @else {
              <span class="select-menu__check-placeholder" aria-hidden="true"></span>
            }
            <span class="select-menu__option-label">{{ placeholder() }}</span>
          </button>
        </li>
      }
      @for (option of options(); track option.value) {
        <li class="select-menu__option" role="presentation">
          <button
            type="button"
            class="select-menu__option-btn"
            role="option"
            [attr.aria-selected]="isSelected(option)"
            (click)="select(option)"
          >
            @if (isSelected(option)) {
              <i class="select-menu__check pi pi-check" aria-hidden="true"></i>
            } @else {
              <span class="select-menu__check-placeholder" aria-hidden="true"></span>
            }
            @if (option.swatchCssColor; as swatchColor) {
              <span
                class="select-menu__swatch"
                [class.select-menu__swatch--clear]="swatchColor === 'transparent'"
                [style.background]="swatchColor === 'transparent' ? null : swatchColor"
                aria-hidden="true"
              ></span>
            }
            <span class="select-menu__option-label">{{ option.label }}</span>
          </button>
        </li>
      }
    </ul>
  }
</div>
