<div
  class="select-menu"
  [class.select-menu--compact]="compact()"
  [class.select-menu--open]="open()"
  [class.select-menu--invalid]="invalid()"
  [class.select-menu--chip-active]="chipActive()"
>
  <button
    type="button"
    class="select-menu__trigger"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-invalid]="invalid() ? true : null"
    [attr.aria-describedby]="describedBy() || null"
    aria-haspopup="listbox"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    @if (triggerIcon(); as icon) {
      <i class="select-menu__trigger-icon pi {{ icon }}" aria-hidden="true"></i>
    }
    @if (selectedSwatchCssColor(); as swatchColor) {
      <span
        class="select-menu__swatch"
        [class.select-menu__swatch--clear]="swatchColor === 'transparent'"
        [style.background]="swatchColor === 'transparent' ? null : swatchColor"
        aria-hidden="true"
      ></span>
    }
    @if (chipLabel(); as chipPrefix) {
      <span class="select-menu__chip-label">{{ chipPrefix }}:</span>
    }
    <span class="select-menu__trigger-label">
      {{ selectedLabel() }}
      @if (fitContent()) {
        <span class="select-menu__sizer" aria-hidden="true">
          @for (sizerLabel of sizerLabels(); track $index) {
            <span class="select-menu__sizer-item">{{ sizerLabel }}</span>
          }
        </span>
      }
    </span>
    @if (!chipActive()) {
      <i class="select-menu__chevron pi pi-chevron-down" aria-hidden="true"></i>
    }
  </button>

  @if (chipActive()) {
    <button
      type="button"
      class="select-menu__clear"
      [attr.aria-label]="'Azzera filtro ' + ariaLabel()"
      (click)="clearFilter($event)"
    >
      <i class="pi pi-times" aria-hidden="true"></i>
    </button>
  }

  @if (open()) {
    <ul
      class="select-menu__panel"
      role="listbox"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-multiselectable]="multiple() ? true : null"
    >
      @if (searchable()) {
        <li class="select-menu__search-item" role="presentation">
          <label class="sr-only" [attr.for]="searchInputId">{{ searchAriaLabel() }}</label>
          <input
            #searchInput
            class="select-menu__search"
            type="search"
            autocomplete="off"
            spellcheck="false"
            [id]="searchInputId"
            [placeholder]="searchPlaceholder()"
            [value]="searchQuery()"
            [attr.aria-label]="searchAriaLabel()"
            (input)="onSearchInput($event)"
            (keydown)="onSearchKeydown($event)"
            (click)="$event.stopPropagation()"
          />
        </li>
      }
      @if (includeEmptyOption()) {
        <li class="select-menu__option" role="presentation">
          <button
            type="button"
            class="select-menu__option-btn"
            role="option"
            [attr.aria-selected]="isEmptySelected()"
            (click)="select({ value: '', label: placeholder() })"
          >
            @if (isEmptySelected()) {
              <i class="select-menu__check pi pi-check" aria-hidden="true"></i>
            } @else {
              <span class="select-menu__check-placeholder" aria-hidden="true"></span>
            }
            <span class="select-menu__option-label">{{ placeholder() }}</span>
          </button>
        </li>
      }
      @for (option of visibleOptions(); track option.value) {
        <li class="select-menu__option" role="presentation">
          <button
            type="button"
            class="select-menu__option-btn"
            [class.select-menu__option-btn--detailed]="option.detail && !inlineDetail()"
            role="option"
            [attr.aria-selected]="isSelected(option)"
            [attr.aria-label]="optionAriaLabel(option)"
            (click)="select(option)"
          >
            @if (isSelected(option)) {
              <i class="select-menu__check pi pi-check" aria-hidden="true"></i>
            } @else {
              <span class="select-menu__check-placeholder" aria-hidden="true"></span>
            }
            @if (option.swatchCssColor; as swatchColor) {
              <span
                class="select-menu__swatch"
                [class.select-menu__swatch--clear]="swatchColor === 'transparent'"
                [style.background]="swatchColor === 'transparent' ? null : swatchColor"
                aria-hidden="true"
              ></span>
            }
            <span
              class="select-menu__option-copy"
              [class.select-menu__option-copy--inline]="inlineDetail()"
            >
              <span class="select-menu__option-label">{{ option.label }}</span>
              @if (option.detail) {
                <span class="select-menu__option-detail tabular-nums">{{ option.detail }}</span>
              }
            </span>
          </button>
        </li>
      }
      @if (showSearchEmptyState()) {
        <li class="select-menu__empty" role="presentation">
          <p class="select-menu__empty-text">Nessun risultato.</p>
        </li>
      }
    </ul>
  }
</div>
