<nav class="app-sidebar" aria-label="Navigazione principale">
  @if (drawerOpen()) {
    <div class="app-sidebar__header">
      <button
        type="button"
        class="app-sidebar__close"
        aria-label="Chiudi menu di navigazione"
        (click)="closeRequested.emit()"
      >
        <i class="pi pi-times" aria-hidden="true"></i>
      </button>
    </div>
  }

  <ul class="app-sidebar__list">
    @for (item of items(); track item.route) {
      <li>
        <a
          class="app-sidebar__link"
          [routerLink]="item.route"
          routerLinkActive="app-sidebar__link--active"
          [routerLinkActiveOptions]="item.linkActiveOptions ?? { exact: true }"
          #rla="routerLinkActive"
          [attr.aria-current]="rla.isActive ? 'page' : null"
        >
          <i class="app-sidebar__icon pi" [ngClass]="item.icon" aria-hidden="true"></i>
          <span class="app-sidebar__label">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>

  @if (showLogout()) {
    <ul class="app-sidebar__footer" aria-label="Account">
      <li class="app-sidebar__logout-item">
        <button
          type="button"
          class="app-sidebar__link app-sidebar__link--action"
          (click)="logoutRequested.emit()"
        >
          <i class="app-sidebar__icon pi pi-sign-out" aria-hidden="true"></i>
          <span class="app-sidebar__label">Esci</span>
        </button>
      </li>
    </ul>
  }
</nav>
