<div class="segmented" role="group" [attr.aria-label]="ariaLabel()">
  @for (option of options(); track option.value) {
    <button
      type="button"
      class="segmented__item"
      [class.segmented__item--active]="isActive(option)"
      [attr.aria-pressed]="isActive(option)"
      (click)="select(option)"
    >
      {{ option.label }}
    </button>
  }
</div>
