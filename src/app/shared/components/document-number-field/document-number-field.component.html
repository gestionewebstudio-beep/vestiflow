<div class="doc-number">
  <div class="doc-number__field">
    <label class="doc-number__label" [attr.for]="numberInputId()">{{ numberLabel() }}</label>
    <input
      class="doc-number__input tabular-nums"
      type="number"
      inputmode="numeric"
      min="1"
      step="1"
      [id]="numberInputId()"
      [value]="number() ?? ''"
      [disabled]="disabled()"
      [attr.aria-label]="numberLabel()"
      (input)="onNumberInput($event)"
    />
    @if (hint()) {
      <p class="doc-number__hint">{{ hint() }}</p>
    }
  </div>

  <div class="doc-number__field doc-number__field--series">
    <span class="doc-number__label">Serie</span>
    @if (hasSeriesChoice() && !disabled()) {
      <app-select-menu
        [options]="seriesOptions()"
        [value]="series()"
        ariaLabel="Serie del documento"
        placeholder="Serie"
        [compact]="true"
        [fullWidth]="true"
        [includeEmptyOption]="false"
        (valueChange)="onSeriesChange($event)"
      />
    } @else {
      <p class="doc-number__series-static">{{ seriesLabel() || '—' }}</p>
    }
  </div>
</div>
