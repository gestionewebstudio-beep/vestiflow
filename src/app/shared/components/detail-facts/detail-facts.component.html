<dl class="detail-facts">
  @for (fact of facts(); track fact.label) {
    <div class="detail-facts__item" [class.detail-facts__item--wide]="fact.wide">
      <dt class="detail-facts__term">{{ fact.label }}</dt>
      <dd class="detail-facts__value" [class.tabular-nums]="fact.numeric">
        <span class="detail-facts__text">{{ fact.value }}</span>
        @if (fact.href) {
          <a
            class="detail-facts__link"
            [href]="fact.href"
            target="_blank"
            rel="noopener noreferrer"
          >
            {{ fact.linkLabel ?? 'Apri collegamento' }}
            <i class="pi pi-external-link" aria-hidden="true"></i>
          </a>
        }
      </dd>
    </div>
  }
</dl>
