# Firebase App Hosting — SPA Angular (senza SSR).
# runCommand esplicito: Cloud Run richiede un processo su PORT (default 8080).
# NON usare scripts.buildCommand né apphosting:build: disattivano l'adapter Angular.
#
# Per cambiare API URL / Supabase: modifica src/environments/environment.prod.ts
# oppure usa npm run build:firebase con variabili VESTIFLOW_* in locale.

scripts:
  runCommand: superstatic serve dist/vestiflow/browser -p $PORT --host 0.0.0.0
