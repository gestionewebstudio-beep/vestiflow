name: Database backup

on:
  schedule:
    # Domenica 03:15 UTC — copia aggiuntiva oltre al backup locale
    - cron: '15 3 * * 0'
  workflow_dispatch:

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Full backup (DB + storage)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Run full backup
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
          SUPABASE_PRODUCT_MEDIA_BUCKET: ${{ vars.SUPABASE_PRODUCT_MEDIA_BUCKET }}
          SUPABASE_USER_AVATARS_BUCKET: ${{ vars.SUPABASE_USER_AVATARS_BUCKET }}
          SUPABASE_DOCUMENT_ATTACHMENTS_BUCKET: ${{ vars.SUPABASE_DOCUMENT_ATTACHMENTS_BUCKET }}
          SUPABASE_SUPPLIER_ATTACHMENTS_BUCKET: ${{ vars.SUPABASE_SUPPLIER_ATTACHMENTS_BUCKET }}
        run: |
          node scripts/backup/run-backup.mjs --output-dir "./backups/ci-${{ github.run_id }}"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: vestiflow-backup-${{ github.run_id }}
          path: backups/ci-${{ github.run_id }}/
          retention-days: 30
          if-no-files-found: error
