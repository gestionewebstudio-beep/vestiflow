name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend with coverage
        run: npm run test:coverage

      - name: Test frontend components (ATL)
        run: npm run test:components

      - name: Install API dependencies
        run: npm ci --prefix api

      - name: Test API with coverage
        run: npm run test:coverage --prefix api

      - name: Build frontend (production)
        run: npm run build -- --configuration=production

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci --prefix api

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare API environment
        run: cp api/.env.example api/.env

      - name: Run Playwright E2E (CI smoke — sempre)
        env:
          E2E_USE_MOCK_AUTH: '1'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          CORS_ORIGINS: http://localhost:4200
        run: npm run e2e:ci

      - name: Run Playwright E2E (autenticato Supabase)
        if: ${{ secrets.E2E_USER_EMAIL != '' && secrets.E2E_USER_PASSWORD != '' }}
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_MFA_CODE: ${{ secrets.E2E_MFA_CODE }}
          E2E_TEST_SKU: ${{ secrets.E2E_TEST_SKU }}
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_PASSWORD: ${{ secrets.E2E_CLERK_PASSWORD }}
          E2E_CLERK_MFA_CODE: ${{ secrets.E2E_CLERK_MFA_CODE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          CORS_ORIGINS: http://localhost:4200
        run: npm run e2e:authenticated

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: npm run audit:lhci
